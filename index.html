<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Shop</title>
  <link rel="stylesheet" href="css/rusla.css">
</head>
<body>

<header>
  <div class="logo">SmartShop</div>

  <input type="text" id="search" placeholder="Поиск товара...">

</header>

<section class="hero">
  <h1>Интернет-магазин</h1>
  <p>Телефоны, компьютеры и техника</p>
</section>

<section class="products" id="products">

  <div class="card" data-name="телефон iphone смартфон">
    <img src="https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5?w=400" alt="">
    <h3>Телефон iPhone</h3>
    <p>Категория: Телефоны</p>
    <button>Купить</button>
  </div>

  <div class="card" data-name="телефон samsung смартфон">
    <img src="https://images.unsplash.com/photo-1598327105666-5b89351aff97?w=400" alt="">
    <h3>Samsung Galaxy</h3>
    <p>Категория: Телефоны</p>
    <button>Купить</button>
  </div>

  <div class="card" data-name="компьютер pc laptop">
    <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=400" alt="">
    <h3>Ноутбук HP</h3>
    <p>Категория: Компьютеры</p>
    <button>Купить</button>
  </div>

  <div class="card" data-name="компьютер gaming pc">
    <img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7?w=400" alt="">
    <h3>Gaming PC</h3>
    <p>Категория: Компьютеры</p>
    <button>Купить</button>
  </div>

</section>

<script>
const search = document.getElementById("search");
const cards = document.querySelectorAll(".card");

search.addEventListener("input", function () {
  const value = this.value.toLowerCase();

  cards.forEach(card => {
    const name = card.getAttribute("data-name");

    if (name.includes(value)) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
});
</script>

</body>
</html>
